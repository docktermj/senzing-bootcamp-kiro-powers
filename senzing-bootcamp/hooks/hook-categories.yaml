# Hook category mapping for sync_hook_registry.py
# Critical hooks are created during onboarding (Step 1).
# Module hooks are created when the bootcamper starts the associated module.

critical:
  - ask-bootcamper
  - review-bootcamper-input
  - code-style-check
  - commonmark-validation
  - enforce-feedback-path
  - enforce-working-directory
  - verify-senzing-facts

modules:
  4:
    - validate-data-files
  5:
    - analyze-after-mapping
    - data-quality-check
  6:
    - backup-before-load
    - run-tests-after-change
    - verify-generated-code
  7:
    - enforce-visualization-offers
    - offer-visualization
  11:
    - deployment-phase-gate
  any:
    - backup-project-on-request
    - git-commit-reminder
