# Hook category mapping for sync_hook_registry.py
# Critical hooks are created during onboarding (Step 1).
# Module hooks are created when the bootcamper starts the associated module.

critical:
  - ask-bootcamper
  - review-bootcamper-input
  - code-style-check
  - commonmark-validation
  - enforce-file-path-policies

modules:
  1:
    - validate-business-problem
  2:
    - verify-sdk-setup
  3:
    - enforce-visualization-offers
    - gate-module3-visualization
    - verify-demo-results
  4:
    - validate-data-files
  5:
    - analyze-after-mapping
    - data-quality-check
    - enforce-mapping-spec
    - enforce-visualization-offers
  6:
    - backup-before-load
    - run-tests-after-change
    - verify-generated-code
  7:
    - enforce-visualization-offers
  8:
    - enforce-visualization-offers
    - validate-benchmark-results
  9:
    - security-scan-on-save
  10:
    - validate-alert-config
  11:
    - deployment-phase-gate
  any:
    - backup-project-on-request
    - error-recovery-context
    - git-commit-reminder
    - module-completion-celebration
