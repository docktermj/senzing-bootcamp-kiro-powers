# governance-rules.yaml
# ---------------------------------------------------------------------------
# Canonical registry of Senzing Bootcamp governing rules and their enforcement.
#
# This file is the single artifact that enumerates the governing rules covered
# by the governance-rule-conformance feature and points at where each rule is
# enforced. It is a verification layer only: it references existing enforcement
# points (steering files, hooks, scripts) WITHOUT relocating, duplicating, or
# modifying the enforcement logic those points contain.
#
# PATH BASE: every `file:` below (in enforced_by and assertions) is resolved
#            RELATIVE TO THE REPOSITORY ROOT (the directory containing
#            `senzing-bootcamp/` and `.github/`).
#
# ASSERTION VALUES: `value` and `pattern` MUST be double-quoted. Inside quotes,
#            the escapes \\  \"  \n  \t  \uXXXX are decoded. The 👉 emoji and any
#            other UTF-8 character may also appear literally between the quotes.
#            Regex `pattern`s are passed verbatim to Python's re.search after
#            decoding (so a registry "\\s" becomes the regex \s).
#
# BEHAVIORAL-ONLY RULES: entries with `static_checkable: false` carry no
#            assertions and are skipped by the validator (see Requirement 8).
#            They are recorded here for discoverability so the coverage boundary
#            between statically-checkable and runtime-only rules is explicit.
#
# OVERLAP NOTE: the `pointer-prefix` rule also overlaps validate_behavior_rules.py
#            (Rule 4). 👉 This registry asserts the pointer requirement
#            INDEPENDENTLY (a substring_present against agent-behavior-rules.md);
#            it does NOT call or delegate to validate_behavior_rules.py. The two
#            checks are decoupled by design (see design.md Requirement 9 mapping).
# ---------------------------------------------------------------------------
rules:
  - id: "pointer-prefix"
    rule: "ALWAYS prefix bootcamper input-requiring prompts with the pointer indicator (👉)."
    category: "conversation-protocol"
    enforced_by:
      - "senzing-bootcamp/steering/agent-behavior-rules.md"
      - "senzing-bootcamp/steering/agent-instructions.md"
    assertions:
      - type: "substring_present"
        file: "senzing-bootcamp/steering/agent-behavior-rules.md"
        value: "Prefix every input-requiring prompt with 👉"
      - type: "substring_present"
        file: "senzing-bootcamp/steering/agent-instructions.md"
        value: "👉"

  - id: "mcp-first"
    rule: "MCP-First Invariant: all Senzing facts come from MCP tool calls, never training data."
    category: "mcp-integrity"
    enforced_by:
      - "senzing-bootcamp/steering/agent-instructions.md"
    assertions:
      - type: "substring_present"
        file: "senzing-bootcamp/steering/agent-instructions.md"
        value: "MCP-First Invariant"

  - id: "rule-06-license-mcp"
    rule: "If the current Senzing license is insufficient, consult the Senzing MCP server for a temporary/larger evaluation license."
    category: "mcp-integrity"
    enforced_by:
      - "senzing-bootcamp/steering/module-01-business-problem.md"
      - "senzing-bootcamp/steering/module-02-sdk-setup.md"
    assertions:
      - type: "substring_present"
        file: "senzing-bootcamp/steering/module-01-business-problem.md"
        value: "search_docs("
      - type: "substring_present"
        file: "senzing-bootcamp/steering/module-02-sdk-setup.md"
        value: "search_docs("

  - id: "rule-15-module3-visualization-gate"
    rule: "Module 3 Step 9 visualization gate is unconditional — no skip escape hatch."
    category: "mandatory-gate"
    enforced_by:
      - "senzing-bootcamp/scripts/validate_mandatory_gates.py"
      - "senzing-bootcamp/hooks/gate-module3-visualization.kiro.hook"
    assertions:
      - type: "regex_present"
        file: "senzing-bootcamp/scripts/validate_mandatory_gates.py"
        pattern: "NON_SKIPPABLE_GATES\\s*=\\s*\\{\"3\\.9\"\\}"
      - type: "substring_absent"
        file: "senzing-bootcamp/hooks/gate-module3-visualization.kiro.hook"
        value: "CONDITION B"

