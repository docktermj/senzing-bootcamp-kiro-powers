metadata:
  version: "1.0.0"
  last_updated: "2026-05-23"
  description: "Hook category mapping — critical hooks created during onboarding, module hooks created when bootcamper starts the associated module"

critical:
  - ask-bootcamper
  - code-style-check
  - commonmark-validation
  - review-bootcamper-input
  - write-policy-gate

modules:
  1:
    - validate-business-problem
  2:
    - verify-sdk-setup
  3:
    - enforce-gate-on-stop
    - enforce-mandatory-gate
    - enforce-visualization-offers
    - gate-module3-visualization
    - verify-demo-results
  4:
    - validate-data-files
  5:
    - analyze-after-mapping
    - data-quality-check
    - enforce-mapping-spec
    - enforce-visualization-offers
  6:
    - backup-before-load
    - run-tests-after-change
    - verify-generated-code
  7:
    - enforce-visualization-offers
  8:
    - enforce-visualization-offers
    - validate-benchmark-results
  9:
    - security-scan-on-save
  10:
    - validate-alert-config
  11:
    - deployment-phase-gate
  any:
    - backup-project-on-request
    - error-recovery-context
    - git-commit-reminder
    - module-completion-celebration
    - module-recap-append
    - session-log-events

agentstop_order:
  - id: ask-bootcamper
    order: 1
    rationale: "Owns answer-processing and closing questions; absolute precedence per agent-instructions."
  - id: module-recap-append
    order: 2
    rationale: "Capture must run before celebration so the recap reflects the just-completed module."
  - id: module-completion-celebration
    order: 3
    rationale: "Celebrates a completed module; must yield to gate-violation output."
  - id: enforce-gate-on-stop
    order: 4
    rationale: "Mandatory-gate safety net; a gate violation outranks a celebration in the same turn."
  - id: enforce-visualization-offers
    order: 5
    rationale: "Lowest-stakes nudge; offers missed visualizations only when nothing higher fired."
