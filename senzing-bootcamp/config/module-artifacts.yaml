version: "1"

# NOTE: All paths below are relative to the BOOTCAMPER'S working directory
# (the project they create during the bootcamp), NOT relative to this power's
# source tree. The agent creates these files/directories at runtime as the
# bootcamper progresses through modules.

modules:
  1:
    produces:
      - path: "docs/business_problem.md"
        type: file
        description: "Business problem definition document"
        required: true
      - path: "config/data_sources.yaml"
        type: file
        description: "Data source registry identifying sources to resolve"
        required: true
    requires_from: {}

  2:
    produces:
      - path: "database/G2C.db"
        type: file
        description: "SQLite database for Senzing engine"
        required: true
      - path: "config/engine_config.json"
        type: file
        description: "Senzing engine configuration"
        required: true
      - path: "config/bootcamp_preferences.yaml"
        type: file
        description: "Bootcamp user preferences (language, style)"
        required: true
      - path: "sdk_installed"
        type: sentinel
        description: "Senzing SDK installed and importable"
        required: true
    requires_from: {}

  3:
    produces:
      - path: "src/system_verification/"
        type: directory
        description: "System verification scripts and outputs"
        required: true
      - path: "docs/progress/MODULE_3_COMPLETE.md"
        type: file
        description: "Module 3 completion marker"
        required: true
    requires_from:
      2: ["database/G2C.db"]

  4:
    produces:
      - path: "data/raw/"
        type: directory
        description: "Raw data source files"
        required: true
      - path: "config/data_sources.yaml"
        type: file
        description: "Data source registry"
        required: true
    requires_from:
      1: ["config/data_sources.yaml"]
      # Module 3 is a soft prerequisite — warn if missing but do not block
      3: ["docs/progress/MODULE_3_COMPLETE.md"]
  5:
    produces:
      - path: "data/transformed/"
        type: directory
        description: "Transformed data files"
        required: true
    requires_from:
      4: ["data/raw/", "config/data_sources.yaml"]
  6:
    produces:
      - path: "src/load/"
        type: directory
        description: "Loading scripts"
        required: true
    requires_from:
      2: ["database/G2C.db"]
      5: ["data/transformed/"]
  7:
    produces:
      - path: "src/query/"
        type: directory
        description: "Query scripts"
        required: true
    requires_from:
      6: ["src/load/"]
  8:
    produces:
      - path: "tests/performance/"
        type: directory
        description: "Performance test scripts"
        required: false
    requires_from:
      7: ["src/query/"]
  9:
    produces:
      - path: "docs/security_checklist.md"
        type: file
        description: "Security assessment checklist"
        required: false
    requires_from:
      8: ["tests/performance/"]
  10:
    produces:
      - path: "monitoring/"
        type: directory
        description: "Monitoring configuration"
        required: false
    requires_from:
      9: ["docs/security_checklist.md"]
  11:
    produces:
      - path: "docs/deployment_plan.md"
        type: file
        description: "Deployment plan document"
        required: false
    requires_from:
      10: ["monitoring/"]
